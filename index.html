<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Store - Inventory Management</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100; }
        }
        @layer components {
            .btn { @apply px-4 py-2 rounded-lg font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2; }
            .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500; }
            .btn-secondary { @apply bg-gray-200 text-gray-800 hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600 focus:ring-gray-400; }
            .input { @apply block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-800 dark:border-gray-700 dark:text-white; }
        }
    </style>
</head>
<body class="min-h-full bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
    <!-- Loader Global -->
    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-white/80 dark:bg-gray-900/80 hidden">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Main Container -->
    <div id="app" class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900">
        <!-- Header/Navbar will be injected here -->
        <header id="header"></header>
        
        <!-- Main Content -->
        <main id="main" class="flex-grow container mx-auto px-4 py-8"></main>

        <!-- Footer -->
        <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-4 mt-auto">
            <div class="container mx-auto px-4 text-center text-sm text-gray-500 dark:text-gray-400">
                &copy; 2024 Clothing Store Inventory. Todos los derechos reservados.
            </div>
        </footer>
    </div>

    <!-- App Entry Point -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
